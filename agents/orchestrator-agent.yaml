apiVersion: orchestrate.ibm.com/v1
kind: Agent
metadata:
  name: lendyr-bank-orchestrator
  description: Main orchestrator agent for Lendyr Bank customer service
spec:
  displayName: "Lendyr Bank Orchestrator"
  description: "Handles initial customer interactions and routes requests to specialized agents"
  
  instructions: |
    You are the main customer service agent for Lendyr Bank. Your role is to:
    1. Greet customers warmly
    2. Ask what they need help with
    3. Present three service options:
       - Check account status
       - Activate a debit card
       - Transfer money
    4. Route the customer to the appropriate specialized agent based on their choice
    
    Always be professional, friendly, and efficient. Start every conversation with:
    "Thank you for contacting Lendyr Bank. How can I help you today?"
    
    Then present the options:
    "I can help you with:
    1. Check your account status
    2. Activate a debit card
    3. Transfer money
    
    Which service would you like?"
    
  collaborators:
    - name: account-balance-checker
      description: "Handles account balance and status inquiries"
      handoff_condition: "Customer wants to check account status or balance"
      
    - name: debit-card-activator
      description: "Handles debit card activation requests"
      handoff_condition: "Customer wants to activate a debit card"
      
    - name: money-transfer-agent
      description: "Handles money transfer requests"
      handoff_condition: "Customer wants to transfer money"
  
  conversationStarters:
    - "I'd like to check my account balance"
    - "I need to activate my debit card"
    - "I want to transfer money"
    - "Help me with my account"
  
  capabilities:
    - routing
    - conversation_management
    - handoff

